<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selamat Hari Raya Idul Fitri Esqi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at top, #0b3d2e, #06241c, #03120e);
      height: 100vh;
      color: white;
      position: relative;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 2s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    .moon {
      position: absolute;
      top: 50px;
      right: 80px;
      width: 120px;
      height: 120px;
      background: #f9e79f;
      border-radius: 50%;
      box-shadow: 0 0 30px #f9e79f, 0 0 60px #f4d03f;
    }

    .moon::after {
      content: "";
      position: absolute;
      top: 15px;
      left: 35px;
      width: 100px;
      height: 100px;
      background: #06241c;
      border-radius: 50%;
    }

    .lantern {
      position: absolute;
      width: 30px;
      height: 50px;
      background: linear-gradient(180deg, #ffd700, #ffb300);
      border-radius: 15px;
      box-shadow: 0 0 20px gold;
      animation: swing 3s infinite ease-in-out;
    }

    .lantern::before {
      content: "";
      position: absolute;
      top: -30px;
      left: 14px;
      width: 2px;
      height: 30px;
      background: #fff;
    }

    .lantern::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 10px;
      width: 10px;
      height: 10px;
      background: gold;
      border-radius: 50%;
      box-shadow: 0 0 10px gold;
    }

    @keyframes swing {
      0%, 100% { transform: rotate(3deg); }
      50% { transform: rotate(-3deg); }
    }

    .lantern1 { top: 0; left: 50px; }
    .lantern2 { top: 0; right: 200px; animation-delay: 1s; }
    .lantern3 { top: 0; left: 200px; animation-delay: 0.5s; }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 850px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 40px 25px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      animation: fadeIn 2s ease;
      z-index: 5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -45%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    .arabic {
      font-size: 2rem;
      color: #f7dc6f;
      margin-bottom: 10px;
      text-shadow: 0 0 15px gold;
    }

    h1 {
      font-size: 2.4rem;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 0 15px #00ffbf;
    }

    h2 {
      font-size: 2rem;
      color: #f9e79f;
      margin-bottom: 20px;
      text-shadow: 0 0 10px gold;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #e8f8f5;
      margin-bottom: 12px;
    }

    .highlight {
      color: #ffd700;
      font-weight: bold;
      text-shadow: 0 0 10px gold;
    }

    .btn {
      margin-top: 15px;
      margin-right: 8px;
      padding: 14px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ffd700, #ffb300);
      color: #06241c;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px gold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px #ffd700;
    }

    .hidden-message {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #ffffff;
      display: none;
      animation: fadeText 1s ease;
    }

    @keyframes fadeText {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ketupat {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #7DCEA0;
      transform: rotate(45deg);
      animation: float 4s infinite ease-in-out;
      box-shadow: 0 0 15px rgba(125, 206, 160, 0.8);
    }

    .ketupat::before, .ketupat::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.15);
    }

    .ketupat::before {
      width: 100%;
      height: 6px;
      top: 22px;
      left: 0;
    }

    .ketupat::after {
      width: 6px;
      height: 100%;
      left: 22px;
      top: 0;
    }
